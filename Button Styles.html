<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SwingPay — 네온 버튼 스타일</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --mint: #2ff5d0;
    --blue: #4d8bff;
    --pink: #ff5fc4;
    --green: #3ef089;
    --purple: #9d7bff;
    --bg1: #070b22;
    --bg2: #0d1336;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background:
      radial-gradient(1100px 700px at 80% -5%, #14204d, transparent 60%),
      radial-gradient(900px 600px at 0% 105%, #1a1140, transparent 55%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    min-height: 100vh;
    font-family: 'Pretendard', system-ui, sans-serif;
    color: #eef1ff;
    -webkit-font-smoothing: antialiased;
    word-break: keep-all;
    padding: 48px 22px 80px;
  }
  .head {
    max-width: 920px; margin: 0 auto 38px;
  }
  .kicker {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 3px;
    color: var(--mint); text-transform: uppercase;
    display: flex; align-items: center; gap: 9px;
  }
  .kicker::before { content: ''; width: 26px; height: 2px; background: var(--mint); box-shadow: 0 0 10px var(--mint); border-radius: 2px; }
  .head h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.6px; margin: 14px 0 8px; }
  .head p { font-size: 15px; color: #9aa3d4; margin: 0; line-height: 1.6; }

  .grid {
    max-width: 920px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px;
  }
  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }

  .cell {
    background: linear-gradient(160deg, rgba(255,255,255,0.055), rgba(255,255,255,0.018));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 26px 24px 30px;
    box-shadow: 0 18px 40px -22px rgba(0,0,0,0.8);
  }
  .cell .label {
    display: flex; align-items: baseline; gap: 9px; margin-bottom: 4px;
  }
  .cell .num {
    font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--mint); opacity: 0.85;
  }
  .cell h3 { font-size: 16px; font-weight: 700; margin: 0; }
  .cell .desc { font-size: 13px; color: #8b93c4; margin: 4px 0 22px; line-height: 1.5; }
  .stage { display: flex; justify-content: center; padding: 8px 0 2px; }

  /* base reset for all buttons */
  .nb {
    -webkit-tap-highlight-color: transparent;
    position: relative; cursor: pointer; border: none; outline: none;
    width: 100%; max-width: 320px;
    font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: 700;
    padding: 16px 24px; border-radius: 15px;
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    transition: transform .12s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease, background .18s ease, color .18s ease, border-color .18s ease;
    will-change: transform;
    user-select: none;
  }
  .nb svg { width: 19px; height: 19px; flex-shrink: 0; }

  /* ── 1. SOLID GLOW — fills + sinks, glow pulses on press ── */
  .b-solid {
    color: #04122a; background: linear-gradient(180deg, #5cffe4, var(--mint));
    box-shadow: 0 10px 26px -8px rgba(47,245,208,0.55), inset 0 1px 0 rgba(255,255,255,0.45);
  }
  .b-solid:hover { box-shadow: 0 14px 34px -8px rgba(47,245,208,0.75), inset 0 1px 0 rgba(255,255,255,0.5); }
  .b-solid:active {
    transform: translateY(3px) scale(0.98);
    box-shadow: 0 3px 12px -4px rgba(47,245,208,0.9), inset 0 2px 8px rgba(0,40,34,0.45);
  }

  /* ── 2. OUTLINE → FILL — neon border, floods with color on press ── */
  .b-outline {
    color: var(--mint); background: rgba(47,245,208,0.04);
    border: 1.5px solid var(--mint);
    box-shadow: 0 0 0 0 rgba(47,245,208,0.0), inset 0 0 14px rgba(47,245,208,0.12);
  }
  .b-outline:hover { box-shadow: 0 0 22px -2px rgba(47,245,208,0.5), inset 0 0 18px rgba(47,245,208,0.18); }
  .b-outline:active {
    color: #04122a; background: var(--mint);
    transform: scale(0.97);
    box-shadow: 0 0 34px -2px rgba(47,245,208,0.85), inset 0 0 0 rgba(47,245,208,0);
  }

  /* ── 3. GLASS + SHINE SWEEP — frosted, light sweeps across on press ── */
  .b-glass {
    color: #eafffb; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(47,245,208,0.45);
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 26px -10px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
    overflow: hidden;
  }
  .b-glass::after {
    content: ''; position: absolute; top: 0; left: -130%; width: 70%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(47,245,208,0.55), transparent);
    transform: skewX(-18deg); pointer-events: none; transition: none;
  }
  .b-glass:hover { border-color: var(--mint); box-shadow: 0 8px 30px -8px rgba(47,245,208,0.4), inset 0 1px 0 rgba(255,255,255,0.18); }
  .b-glass:active { transform: scale(0.975); }
  .b-glass.swept::after { animation: sweep .6s ease; }
  @keyframes sweep { from { left: -130%; } to { left: 130%; } }

  /* ── 4. GRADIENT MULTI-NEON — mint→blue→purple, depresses ── */
  .b-grad {
    color: #fff; background: linear-gradient(100deg, var(--mint), var(--blue) 55%, var(--purple));
    background-size: 180% 100%; background-position: 0% 50%;
    box-shadow: 0 12px 30px -10px rgba(77,139,255,0.6), inset 0 1px 0 rgba(255,255,255,0.35);
    text-shadow: 0 1px 8px rgba(7,11,34,0.35);
  }
  .b-grad:hover { background-position: 100% 50%; box-shadow: 0 16px 38px -10px rgba(157,123,255,0.7), inset 0 1px 0 rgba(255,255,255,0.4); }
  .b-grad:active { transform: translateY(2px) scale(0.98); box-shadow: 0 4px 14px -6px rgba(157,123,255,0.85), inset 0 2px 10px rgba(0,0,30,0.4); }

  /* ── 5. TECH SCANLINE — animated dashed neon border, brackets ── */
  .b-tech {
    color: var(--green); background: rgba(62,240,137,0.05);
    border: 1px solid rgba(62,240,137,0.3);
    font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.3px;
    box-shadow: inset 0 0 18px rgba(62,240,137,0.08);
  }
  .b-tech::before, .b-tech::after {
    content: ''; position: absolute; width: 13px; height: 13px; pointer-events: none;
    border: 2px solid var(--green); box-shadow: 0 0 8px rgba(62,240,137,0.6);
    transition: all .2s ease;
  }
  .b-tech::before { top: 6px; left: 6px; border-right: none; border-bottom: none; border-radius: 4px 0 0 0; }
  .b-tech::after { bottom: 6px; right: 6px; border-left: none; border-top: none; border-radius: 0 0 4px 0; }
  .b-tech:hover { background: rgba(62,240,137,0.1); box-shadow: 0 0 24px -4px rgba(62,240,137,0.45), inset 0 0 18px rgba(62,240,137,0.12); }
  .b-tech:hover::before, .b-tech:hover::after { width: 17px; height: 17px; }
  .b-tech:active { transform: scale(0.97); color: #04221a; background: var(--green); }
  .b-tech:active::before, .b-tech:active::after { border-color: #04221a; box-shadow: none; }

  /* ── 6. PINK UNDERGLOW PILL — floating pill, glow blooms on press ── */
  .b-pill {
    color: #fff; background: rgba(255,95,196,0.1); border-radius: 999px;
    border: 1.5px solid rgba(255,95,196,0.55);
    box-shadow: 0 6px 22px -8px rgba(255,95,196,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .b-pill:hover { background: rgba(255,95,196,0.16); box-shadow: 0 10px 30px -8px rgba(255,95,196,0.7), 0 0 22px -4px rgba(255,95,196,0.5), inset 0 1px 0 rgba(255,255,255,0.16); }
  .b-pill:active {
    transform: scale(0.96);
    background: linear-gradient(180deg, #ff7fd0, var(--pink));
    color: #2a0420;
    box-shadow: 0 0 40px -4px rgba(255,95,196,0.9), inset 0 2px 8px rgba(80,0,50,0.35);
  }

  /* ripple */
  .ripple { position: absolute; border-radius: 999px; transform: scale(0); pointer-events: none;
    background: radial-gradient(circle, rgba(255,255,255,0.55), transparent 70%); animation: rip .55s ease-out; }
  @keyframes rip { to { transform: scale(2.6); opacity: 0; } }

  .hint { max-width: 920px; margin: 30px auto 0; font-size: 13px; color: #6d75a3; text-align: center; }
  .hint b { color: var(--mint); }
</style>
</head>
<body>
  <div class="head">
    <div class="kicker">SwingPay · Login Button</div>
    <h1>"다른 방법으로 로그인" 네온 버튼 스타일</h1>
    <p>모두 실제로 눌러보세요 — 각 버튼마다 다른 <b style="color:#cdd3ff">누르는 느낌(press)</b>을 넣었습니다. 마음에 드는 번호를 알려주시면 로그인 화면에 적용할게요.</p>
  </div>

  <div class="grid" id="grid"></div>

  <p class="hint">팁: 길게 누르면 가라앉는 깊이감, 떼면 튀어오르는 탄성을 확인할 수 있어요 · 기본 라벨 <b>다른 방법으로 로그인</b></p>

<script>
  const KEY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="4"/><path d="M10.8 12.2 19 4M16 7l2 2M14 9l1.5 1.5"/></svg>';
  const PHONE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="3"/><path d="M11 18h2"/></svg>';

  const buttons = [
    { cls: 'b-solid',   name: '솔리드 글로우',   desc: '꽉 찬 민트 네온. 누르면 아래로 쑥 가라앉고 글로우가 응축됩니다.', icon: PHONE },
    { cls: 'b-outline', name: '아웃라인 → 필',   desc: '평소엔 네온 테두리, 누르는 순간 민트로 가득 차오릅니다.', icon: KEY },
    { cls: 'b-glass',   name: '글래스 샤인',     desc: '반투명 유리 질감. 누르면 빛줄기가 표면을 스쳐 지나갑니다.', icon: PHONE, sweep: true },
    { cls: 'b-grad',    name: '멀티 네온 그라디언트', desc: '민트→블루→퍼플 흐름. 호버 시 색이 흐르고, 누르면 눌립니다.', icon: KEY },
    { cls: 'b-tech',    name: '테크 스캔 브래킷', desc: '코너 브래킷이 살아있는 테크 무드. 누르면 그린으로 점등.', icon: KEY },
    { cls: 'b-pill',    name: '핑크 언더글로우 필', desc: '둥근 알약형. 누르면 핑크 글로우가 활짝 피어납니다.', icon: PHONE },
  ];

  const grid = document.getElementById('grid');
  buttons.forEach((b, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `
      <div class="label"><span class="num">${String(i+1).padStart(2,'0')}</span><h3>${b.name}</h3></div>
      <div class="desc">${b.desc}</div>
      <div class="stage">
        <button class="nb ${b.cls}">${b.icon}<span>다른 방법으로 로그인</span></button>
      </div>`;
    grid.appendChild(cell);

    const btn = cell.querySelector('button');
    // ripple on all
    btn.addEventListener('pointerdown', (e) => {
      const r = btn.getBoundingClientRect();
      const rip = document.createElement('span');
      rip.className = 'ripple';
      const size = Math.max(r.width, r.height) * 0.8;
      rip.style.width = rip.style.height = size + 'px';
      rip.style.left = (e.clientX - r.left - size/2) + 'px';
      rip.style.top = (e.clientY - r.top - size/2) + 'px';
      btn.appendChild(rip);
      setTimeout(() => rip.remove(), 560);
      if (b.sweep) { btn.classList.remove('swept'); void btn.offsetWidth; btn.classList.add('swept'); }
    });
  });
</script>
</body>
</html>
